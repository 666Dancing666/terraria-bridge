name: Build TShock Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download TShock
        run: |
          curl -L -o TShock.zip "https://github.com/Pryaxis/TShock/releases/download/v6.1.0/TShock-6.1.0-for-Terraria-1.4.5.6-win-x64-Release.zip"
          unzip TShock.zip -d TShock

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: |
          dotnet build tshock-plugin/TerrariaBridge.csproj -c Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: TerrariaBridge
          path: tshock-plugin/bin/Release/TerrariaBridge.dll
