<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraria Bridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.header { background: #16213e; padding: 20px; text-align: center; border-bottom: 2px solid #0f3460; }
.header h1 { color: #e94560; font-size: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
.card { background: #16213e; border-radius: 10px; padding: 20px; text-align: center; border: 1px solid #0f3460; }
.card .value { font-size: 32px; font-weight: bold; color: #e94560; }
.card .label { font-size: 13px; color: #888; margin-top: 5px; }
.online { color: #4ecca3 !important; }
.offline { color: #e94560 !important; }
.section { padding: 0 20px 20px 20px; }
.section h2 { color: #e94560; margin-bottom: 10px; font-size: 18px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
th { color: #888; font-size: 12px; }
button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
button:hover { background: #c73e54; }
.refresh { text-align: center; padding: 10px; color: #888; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
<h1>Terraria Bridge</h1>
<p style="color:#888;margin-top:5px;">泰拉瑞亚 ↔ 我的世界</p>
</div>

<div class="grid">
<div class="card"><div class="value online" id="status">●</div><div class="label">服务状态</div></div>
<div class="card"><div class="value" id="tshockStatus">-</div><div class="label">TShock</div></div>
<div class="card"><div class="value" id="mcCount">0</div><div class="label">MC 在线</div></div>
<div class="card"><div class="value" id="uptime">-</div><div class="label">运行时间</div></div>
<div class="card"><div class="value" id="latency">-</div><div class="label">延迟</div></div>
<div class="card"><div class="value" id="msgIn">0</div><div class="label">消息接收</div></div>
<div class="card"><div class="value" id="msgOut">0</div><div class="label">消息发送</div></div>
</div>

<div class="section"><button onclick="loadData()">刷新</button></div>
<div class="refresh">每 3 秒自动刷新</div>

<script>
async function loadData() {
try {
const res = await fetch('/health');
const data = await res.json();
document.getElementById('status').className = 'value online';
const ts = document.getElementById('tshockStatus');
if (data.tshock_online) { ts.textContent = '已连接'; ts.className = 'value online'; }
else { ts.textContent = '未连接'; ts.className = 'value offline'; }
document.getElementById('mcCount').textContent = data.mc_players || 0;
document.getElementById('uptime').textContent = data.uptime || '-';
if (data.latency) {
document.getElementById('latency').textContent = data.latency.last_latency || '-';
document.getElementById('msgIn').textContent = data.latency.total_in || 0;
document.getElementById('msgOut').textContent = data.latency.total_out || 0;
}
} catch(e) {
document.getElementById('status').textContent = '离线';
document.getElementById('status').className = 'value offline';
}
}
loadData();
setInterval(loadData, 3000);
</script>
</body>
</html>
