<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraria Bridge - 管理面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.header { background: #16213e; padding: 20px; text-align: center; border-bottom: 2px solid #0f3460; }
.header h1 { color: #e94560; font-size: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
.card { background: #16213e; border-radius: 10px; padding: 20px; text-align: center; border: 1px solid #0f3460; }
.card .value { font-size: 36px; font-weight: bold; color: #e94560; }
.card .label { font-size: 14px; color: #888; margin-top: 5px; }
.online { color: #4ecca3 !important; }
.offline { color: #e94560 !important; }
.section { padding: 0 20px 20px 20px; }
.section h2 { color: #e94560; margin-bottom: 10px; font-size: 18px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
th { color: #888; font-size: 12px; text-transform: uppercase; }
.log { background: #16213e; border-radius: 10px; padding: 15px; margin: 0 20px 20px 20px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
.log .ts { color: #e94560; }
.log .mc { color: #4ecca3; }
.log .info { color: #888; }
.refresh { text-align: center; padding: 10px; color: #888; font-size: 12px; }
button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
button:hover { background: #c73e54; }
</style>
</head>
<body>
<div class="header">
<h1>Terraria Bridge</h1>
<p style="color:#888;margin-top:5px;">泰拉瑞亚 ↔ 我的世界 桥接服务</p>
</div>

<div class="grid">
<div class="card">
<div class="value" id="status">●</div>
<div class="label">服务状态</div>
</div>
<div class="card">
<div class="value" id="tshockStatus">-</div>
<div class="label">TShock</div>
</div>
<div class="card">
<div class="value" id="mcCount">0</div>
<div class="label">MC 在线玩家</div>
</div>
<div class="card">
<div class="value" id="uptime">-</div>
<div class="label">运行时间</div>
</div>
</div>

<div class="section">
<h2>消息统计</h2>
<table>
<thead><tr><th>消息类型</th><th>拦截次数</th></tr></thead>
<tbody id="msgStats"></tbody>
</table>
</div>

<div class="section">
<h2>在线玩家</h2>
<table>
<thead><tr><th>玩家 ID</th><th>连接时间</th><th>消息数</th></tr></thead>
<tbody id="playerList"></tbody>
</table>
</div>

<div class="section">
<button onclick="loadData()">刷新数据</button>
</div>

<div class="refresh">每 5 秒自动刷新</div>

<script>
async function loadData() {
try {
const res = await fetch('/health');
const data = await res.json();

document.getElementById('status').innerHTML = '●';
document.getElementById('status').className = 'value online';

const tsEl = document.getElementById('tshockStatus');
if (data.tshock_online) {
tsEl.textContent = '已连接';
tsEl.className = 'value online';
} else {
tsEl.textContent = '未连接';
tsEl.className = 'value offline';
}

document.getElementById('mcCount').textContent = data.mc_players || 0;

const stats = data.blocked_msgs || {};
const statsBody = document.getElementById('msgStats');
statsBody.innerHTML = '';
for (const [type, count] of Object.entries(stats)) {
statsBody.innerHTML += `<tr><td>${type}</td><td>${count}</td></tr>`;
}
if (Object.keys(stats).length === 0) {
statsBody.innerHTML = '<tr><td colspan="2" style="color:#888;">暂无拦截消息</td></tr>';
}

const players = data.players || [];
const playerBody = document.getElementById('playerList');
playerBody.innerHTML = '';
for (const p of players) {
playerBody.innerHTML += `<tr><td>${p.id}</td><td>${p.since || '-'}</td><td>${p.msgs || 0}</td></tr>`;
}
if (players.length === 0) {
playerBody.innerHTML = '<tr><td colspan="3" style="color:#888;">暂无在线玩家</td></tr>';
}

} catch(e) {
document.getElementById('status').textContent = '●';
document.getElementById('status').className = 'value offline';
}
}

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
